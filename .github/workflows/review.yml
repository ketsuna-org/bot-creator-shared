name: CI Tests

on:
  pull_request:
    branches: ["master", "main"]
  push:
    branches: ["master", "main"]

jobs:
  analyze_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze project
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test